<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <!-- iOS Safari特有のバウンススクロールや拡大を無効化するviewport設定 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>格闘ゲーム反応訓練</title>
  
  <!-- iOS PWA化のためのメタタグ -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <!-- ==========================================
       style.css 相当部分
       ========================================== -->
  <style>
    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background-color: #000; overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      
      /* 【必須】iOS: スクロール、ピンチズーム、ダブルタップ拡大を完全無効化 */
      touch-action: none;
      /* 【必須】iOS: 長押しによるテキスト選択やメニュー表示を無効化 */
      -webkit-user-select: none;
      user-select: none;
      /* 【必須】iOS: タップ時のグレーのハイライトを無効化 */
      -webkit-tap-highlight-color: transparent;
      /* 【必須】iOS: 長押しによるコールアウトメニューを無効化 */
      -webkit-touch-callout: none;
    }

    .layer {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    }

    video {
      width: 100%; height: 100%; object-fit: cover;
      display: none; /* DOM破棄によるメモリリークを防ぐため、displayで切り替え */
    }

    .btn {
      position: absolute;
      background: rgba(255, 255, 255, 0.2);
      border: 2px solid rgba(255, 255, 255, 0.8);
      border-radius: 50%;
      color: #fff; font-weight: bold; font-size: 18px;
      display: flex; justify-content: center; align-items: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      backdrop-filter: blur(4px);
      transition: background 0.1s;
    }
    .btn:active {
      background: rgba(255, 255, 255, 0.5);
    }

    /* エルゴノミクスを考慮したボタン配置（親指で届く位置） */
    #btn-guard  { bottom: 40px; left: 30px; width: 80px; height: 80px; }
    #btn-throw  { bottom: 130px; right: 90px; width: 70px; height: 70px; }
    #btn-attack { bottom: 40px; right: 30px; width: 80px; height: 80px; }

    #start-screen {
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      background: #111; z-index: 100; color: #fff;
    }

    #start-btn {
      padding: 15px 40px; font-size: 24px; font-weight: bold;
      background: #e50914; color: #fff; border: none; border-radius: 8px;
      margin-top: 30px;
    }

    #debug-layer {
      display: none; transition: background-color 0.1s;
      padding: 20px; box-sizing: border-box; color: white;
    }

    .debug-info {
      background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px;
      font-size: 20px; font-family: monospace;
    }

    #result-text {
      position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%);
      font-size: 48px; font-weight: 900; color: #fff;
      text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
      display: none; z-index: 50; text-align: center; width: 100%;
    }
  </style>
</head>
<body>

  <!-- スタート画面（ユーザーインタラクションを強制し、動画再生権限を得る） -->
  <div id="start-screen" class="layer">
    <h1>反応訓練 PWA</h1>
    <p style="color: #aaa; margin-top: 10px;">デバッグモード起動中</p>
    <button id="start-btn">START</button>
  </div>

  <!-- ゲーム画面 -->
  <div id="game-container" style="display: none;">
    
    <!-- 動画レイヤー -->
    <div id="video-layer" class="layer">
      <!-- 【必須】iOS Safariでインライン自動再生するための属性 -->
      <video id="video-fail" playsinline webkit-playsinline muted preload="auto"></video>
      <video id="video-success" playsinline webkit-playsinline muted preload="auto"></video>
    </div>
    
    <!-- デバッグレイヤー（動画がない場合の代替表示） -->
    <div id="debug-layer" class="layer">
      <div class="debug-info">
        シーン: <span id="debug-scene-name">-</span><br>
        フレーム: <span id="debug-frame">0</span>
      </div>
    </div>
    
    <!-- UIレイヤー -->
    <div id="ui-layer" class="layer" style="z-index: 10;">
      <div id="result-text"></div>
      
      <div id="btn-guard" class="btn">ガード</div>
      <div id="btn-throw" class="btn">投げ</div>
      <div id="btn-attack" class="btn">攻撃</div>
    </div>
  </div>

  <!-- ==========================================
       sw.js および app.js 相当部分
       ========================================== -->
  <script>
    // ------------------------------------------
    // PWA Service Worker 登録 (Blob化インライン実装)
    // ------------------------------------------
    const initPWA = () => {
      // 1. 動的マニフェスト生成
      const manifest = {
        name: "格闘ゲーム反応訓練",
        short_name: "反応訓練",
        start_url: ".",
        display: "standalone",
        background_color: "#000000",
        theme_color: "#000000",
        icons: [{
          src: "data:image/svg+xml;charset=utf-8,<svg xmlns='http://www.w3.org/2000/svg' width='192' height='192'><rect width='192' height='192' fill='%23e50914'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' fill='%23fff' font-size='64'>練</text></svg>",
          sizes: "192x192", type: "image/svg+xml"
        }]
      };
      const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
      const link = document.createElement('link');
      link.rel = 'manifest'; link.href = URL.createObjectURL(manifestBlob);
      document.head.appendChild(link);

      // 2. Cache First戦略のService Worker
      const swCode = `
        const CACHE_NAME = 'fg-train-cache-v1';
        self.addEventListener('install', e => self.skipWaiting());
        self.addEventListener('activate', e => e.waitUntil(clients.claim()));
        self.addEventListener('fetch', e => {
          e.respondWith(
            caches.match(e.request).then(res => {
              return res || fetch(e.request).then(fetchRes => {
                // 動画アセット等を動的にキャッシュ
                if (e.request.url.includes('.mp4')) {
                  const resClone = fetchRes.clone();
                  caches.open(CACHE_NAME).then(cache => cache.put(e.request, resClone));
                }
                return fetchRes;
              });
            }).catch(() => new Response('', {status: 408})) // Offline fallback
          );
        });
      `;
      const swBlob = new Blob([swCode], {type: 'application/javascript'});
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register(URL.createObjectURL(swBlob))
          .then(() => console.log('SW Registered'))
          .catch(e => console.warn('SW Registration failed (Blob URI scope issue):', e));
      }
    };
    initPWA();

    // ------------------------------------------
    // アプリケーションロジック
    // ------------------------------------------
    
    // 【重要】開発効率・デバッグ用フラグ
    // false にすると実際の動画（assets/xxx.mp4）を再生しようとします
    const DEBUG_MODE = true; 
    const FPS = 60;

    // DOM要素
    const dom = {
      startScreen: document.getElementById('start-screen'),
      startBtn: document.getElementById('start-btn'),
      gameContainer: document.getElementById('game-container'),
      videoFail: document.getElementById('video-fail'),
      videoSuccess: document.getElementById('video-success'),
      debugLayer: document.getElementById('debug-layer'),
      sceneName: document.getElementById('debug-scene-name'),
      frameCounter: document.getElementById('debug-frame'),
      resultText: document.getElementById('result-text'),
      btnGuard: document.getElementById('btn-guard'),
      btnThrow: document.getElementById('btn-throw'),
      btnAttack: document.getElementById('btn-attack'),
      uiLayer: document.getElementById('ui-layer')
    };

    // シーン定義（ファクトリパターンのデータ構造）
    const SCENES = [
      {
        type: 'midGuard',
        params: {
          successVideo: 'assets/wakeup-back-fail.mp4', failVideo: 'assets/wakeup-back-fail.mp4',
          judgeStartF: 20, judgeEndF: 35,
          colorFail: '#800000', colorSuccess: '#006400', name: '中段ガード（上フリック）'
        }
      },
      {
        type: 'lowGuard',
        params: {
          successVideo: 'assets/wakeup-back-fail.mp4', failVideo: 'assets/wakeup-back-fail.mp4',
          judgeStartF: 0, judgeEndF: 40,
          colorFail: '#000080', colorSuccess: '#006400', name: '下段ガード（ガード継続）'
        }
      },
      {
        type: 'throwEscape',
        params: {
          successVideo: 'assets/wakeup-back-fail.mp4', failVideo: 'assets/wakeup-back-fail.mp4',
          judgeStartF: 15, judgeEndF: 25,
          colorFail: '#4B0082', colorSuccess: '#006400', name: '投げ抜け（投げボタン）'
        }
      },
      {
        type: 'abare',
        params: {
          successVideo: 'assets/wakeup-back-fail.mp4', failVideo: 'assets/wakeup-back-fail.mp4',
          judgeStartF: 10, judgeEndF: 20,
          colorFail: '#8B6508', colorSuccess: '#006400', name: '暴れ（攻撃ボタン）'
        }
      }
    ];

    // ゲーム状態
    let state = {
      sceneIndex: 0,
      isRunning: false,
      status: 'PLAYING', // PLAYING, SUCCESS, FAIL
      currentFrame: 0,
      rafId: null,
      abortController: null, // メモリリーク防止の要
      input: {
        isGuarding: false,
        flickStartY: 0,
        flickStartTime: 0
      }
    };

    // 動画再生ヘルパー（iOSの真っ暗防止とPromiseのrejectハンドリング）
    const playVideo = (videoEl, src) => {
      return new Promise((resolve, reject) => {
        videoEl.src = src;
        videoEl.load();
        
        const onCanPlay = async () => {
          videoEl.removeEventListener('canplaythrough', onCanPlay);
          try {
            await videoEl.play();
            videoEl.style.display = 'block';
            resolve();
          } catch (err) {
            console.error("iOS AutoPlay Policy Blocked:", err);
            reject(err);
          }
        };
        videoEl.addEventListener('canplaythrough', onCanPlay);
        videoEl.addEventListener('error', e => reject(e));
      });
    };

    // UIテキスト表示
    const showResult = (text, color) => {
      dom.resultText.innerText = text;
      dom.resultText.style.color = color;
      dom.resultText.style.display = 'block';
    };

    // 成功・失敗のトリガー
    const triggerSuccess = async (msg) => {
      if (state.status !== 'PLAYING') return;
      console.log(`[SUCCESS] ${msg} (Frame: ${state.currentFrame})`);
      state.status = 'SUCCESS';
      showResult("SUCCESS!", "#00ff00");

      if (DEBUG_MODE) {
        dom.debugLayer.style.backgroundColor = SCENES[state.sceneIndex].params.colorSuccess;
      } else {
        dom.videoFail.pause();
        dom.videoFail.style.display = 'none';
        try {
          await playVideo(dom.videoSuccess, SCENES[state.sceneIndex].params.successVideo);
          dom.videoSuccess.onended = () => endScene();
        } catch(e) { endScene(); }
      }
    };

    const triggerFail = (msg) => {
      if (state.status !== 'PLAYING') return;
      console.log(`[FAIL] ${msg} (Frame: ${state.currentFrame})`);
      state.status = 'FAIL';
      showResult("FAIL", "#ff0000");
      // 失敗時は現在のFail動画（またはFail背景）を最後まで流し続ける
    };

    // シーン終了と次への遷移
    const endScene = () => {
      state.isRunning = false;
      cancelAnimationFrame(state.rafId);
      if (!DEBUG_MODE) {
        dom.videoFail.pause();
        dom.videoSuccess.pause();
      }
      setTimeout(() => {
        dom.resultText.style.display = 'none';
        state.sceneIndex = (state.sceneIndex + 1) % SCENES.length;
        runScene(SCENES[state.sceneIndex]);
      }, 1000);
    };

    // フレーム毎のロジック判定
    const checkLogic = (sceneConfig) => {
      if (state.status !== 'PLAYING') return;
      const p = sceneConfig.params;

      if (sceneConfig.type === 'lowGuard') {
        // 下段ガード: 判定終了フレームまでガードし続ければ成功、離したら即失敗
        if (!state.input.isGuarding) {
           if (state.currentFrame <= p.judgeEndF) triggerFail("ガードを離した");
        } else {
           if (state.currentFrame === p.judgeEndF) triggerSuccess("下段ガード成功！");
        }
      } else {
        // それ以外: 判定期間を過ぎたらタイムアウトで失敗
        if (state.currentFrame > p.judgeEndF) {
           triggerFail("入力遅延 または 未入力");
        }
      }
    };

    // イベントリスナーのセットアップ（AbortControllerで確実な破棄）
    const setupEvents = (sceneConfig) => {
      if (state.abortController) state.abortController.abort();
      state.abortController = new AbortController();
      const { signal } = state.abortController;
      const p = sceneConfig.params;

      // ガードボタン (touchstart / touchend で状態管理)
      dom.btnGuard.addEventListener('touchstart', (e) => {
        e.preventDefault(); state.input.isGuarding = true;
      }, { signal });
      dom.btnGuard.addEventListener('touchend', (e) => {
        e.preventDefault(); state.input.isGuarding = false;
      }, { signal });

      // 投げボタン
      dom.btnThrow.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const inWindow = state.currentFrame >= p.judgeStartF && state.currentFrame <= p.judgeEndF;
        if (sceneConfig.type === 'throwEscape') {
          inWindow ? triggerSuccess("投げ抜け成功") : triggerFail("タイミングミス");
        } else {
          triggerFail("誤操作（投げ）");
        }
      }, { signal });

      // 攻撃ボタン
      dom.btnAttack.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const inWindow = state.currentFrame >= p.judgeStartF && state.currentFrame <= p.judgeEndF;
        if (sceneConfig.type === 'abare') {
          inWindow ? triggerSuccess("暴れ成功") : triggerFail("タイミングミス");
        } else {
          triggerFail("誤操作（攻撃）");
        }
      }, { signal });

      // 画面全体フリック判定（中段ガード用）
      dom.uiLayer.addEventListener('touchstart', (e) => {
        if(e.target.classList.contains('btn')) return; // ボタンタップ時は除外
        state.input.flickStartY = e.touches[0].clientY;
        state.input.flickStartTime = performance.now();
      }, { signal });

      dom.uiLayer.addEventListener('touchend', (e) => {
        if(e.target.classList.contains('btn')) return;
        const dy = state.input.flickStartY - e.changedTouches[0].clientY;
        const dt = performance.now() - state.input.flickStartTime;
        
        // 50px以上かつ300ms以内なら上フリック判定
        if (dy > 50 && dt < 300) {
          const inWindow = state.currentFrame >= p.judgeStartF && state.currentFrame <= p.judgeEndF;
          if (sceneConfig.type === 'midGuard') {
            inWindow ? triggerSuccess("中段ガード成功") : triggerFail("タイミングミス");
          }
        }
      }, { signal });
    };

    // シーンの実行
    const runScene = async (sceneConfig) => {
      console.log(`=== シーン開始: ${sceneConfig.type} ===`);
      state.isRunning = true;
      state.status = 'PLAYING';
      state.currentFrame = 0;
      state.input.isGuarding = false;

      setupEvents(sceneConfig);

      if (DEBUG_MODE) {
        // デバッグモード: 背景色とJSタイマーで動画をエミュレート
        dom.debugLayer.style.display = 'block';
        dom.debugLayer.style.backgroundColor = sceneConfig.params.colorFail;
        dom.sceneName.innerText = sceneConfig.params.name;
        
        const startTime = performance.now();
        const maxFrames = 60; // 失敗時の動画終了想定フレーム

        const loop = (time) => {
          if (!state.isRunning) return;
          state.currentFrame = Math.floor((time - startTime) / (1000 / FPS));
          dom.frameCounter.innerText = state.currentFrame;
          
          checkLogic(sceneConfig);
          
          if (state.currentFrame >= maxFrames && state.status !== 'SUCCESS') {
            endScene(); return;
          }
          state.rafId = requestAnimationFrame(loop);
        };
        state.rafId = requestAnimationFrame(loop);

      } else {
        // 本番モード: 実際のVideo要素を使用
        dom.videoFail.style.display = 'none';
        dom.videoSuccess.style.display = 'none';
        
        try {
          await playVideo(dom.videoFail, sceneConfig.params.failVideo);
          
          const loop = () => {
            if (!state.isRunning) return;
            state.currentFrame = Math.floor(dom.videoFail.currentTime * FPS);
            checkLogic(sceneConfig);
            
            if (dom.videoFail.ended && state.status !== 'SUCCESS') {
              endScene(); return;
            }
            state.rafId = requestAnimationFrame(loop);
          };
          state.rafId = requestAnimationFrame(loop);

        } catch (err) {
          console.error("動画再生失敗。DEBUG_MODEをオンにしてください。", err);
          triggerFail("再生エラー");
          setTimeout(endScene, 2000);
        }
      }
    };

    // 起動フック（ユーザーアクション起点でAudio/Video権限をアンロック）
    dom.startBtn.addEventListener('click', async () => {
      dom.startScreen.style.display = 'none';
      dom.gameContainer.style.display = 'block';

      if (!DEBUG_MODE) {
        // iOS Safari対策: 初回タップ時に一瞬再生して権限を確保する
        const unlock = async (v) => {
          try {
            await v.play();
            v.pause(); v.currentTime = 0;
          } catch(e) { console.warn("Unlock ignored:", e); }
        };
        await Promise.all([unlock(dom.videoFail), unlock(dom.videoSuccess)]);
      }

      runScene(SCENES[state.sceneIndex]);
    });

  </script>
</body>
</html>
